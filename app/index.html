<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#22c55e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>FitSorted PWA</title>
  <link rel="manifest" href="/app/manifest.json" />
  <style>
    :root{
      --bg:#0f172a;--card:#1e293b;--accent:#22c55e;--text:#e2e8f0;--muted:#94a3b8;--danger:#ef4444;--radius:14px;
      --paper:#f5f0e8;--paper-ink:#1f2937;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Helvetica,Arial,sans-serif}
    body{min-height:100vh}
    .app{max-width:420px;margin:0 auto;padding:16px 16px 90px}
    .header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
    .brand{font-weight:700;font-size:20px;display:flex;gap:8px;align-items:center}
    .pill{background:#0b1222;border:1px solid #1f2937;color:var(--muted);padding:6px 10px;border-radius:999px;font-size:12px}
    .section{display:none;opacity:0;transform:translateY(6px);transition:all .25s ease}
    .section.active{display:block;opacity:1;transform:translateY(0)}
    .card{background:var(--card);border:1px solid #1f2937;border-radius:var(--radius);padding:16px;box-shadow:0 10px 30px rgba(0,0,0,.25)}
    .muted{color:var(--muted)}

    /* Receipt */
    .receipt-wrap{display:grid;place-items:center;margin-top:8px}
    .receipt{font-family:"Courier New",Courier,monospace;background:var(--paper);color:var(--paper-ink);width:100%;padding:18px 16px 28px;border-radius:6px;position:relative;box-shadow:0 18px 40px rgba(0,0,0,.35);transform:rotate(-1deg);animation:slideUp .45s ease}
    .receipt:before{content:"";position:absolute;inset:0;background-image:radial-gradient(rgba(0,0,0,.05) 1px, transparent 0);background-size:3px 3px;mix-blend-mode:multiply;opacity:.35;pointer-events:none;border-radius:6px}
    .receipt h1{margin:0;text-align:center;font-size:18px;letter-spacing:4px}
    .receipt .date{text-align:center;font-size:12px;margin-top:4px}
    .dash{border-top:1px dashed #9ca3af;margin:10px 0}
    .dots{border-top:1px dotted #9ca3af;margin:10px 0}
    .row{display:flex;justify-content:space-between;gap:8px;font-size:13px}
    .row strong{font-weight:700}
    .macro-list{margin-top:6px}
    .total{font-size:14px;font-weight:700}
    .budget{margin-top:10px;font-size:12px}
    .tip{margin-top:8px;font-size:12px;display:flex;gap:6px}
    .receipt-footer{text-align:left;font-size:12px;margin-top:10px}
    .tear{position:absolute;left:0;right:0;bottom:-10px;height:12px;background:var(--paper);clip-path:polygon(0 0,5% 100%,10% 0,15% 100%,20% 0,25% 100%,30% 0,35% 100%,40% 0,45% 100%,50% 0,55% 100%,60% 0,65% 100%,70% 0,75% 100%,80% 0,85% 100%,90% 0,95% 100%,100% 0,100% 100%,0 100%)}
    @keyframes slideUp{from{transform:translateY(16px) rotate(-1deg);opacity:.5}to{transform:translateY(0) rotate(-1deg);opacity:1}}

    /* Heatmap */
    .heatmap-card{background:#0b1222;border:1px solid #1f2937;border-radius:12px;padding:14px}
    .heatmap{display:grid;grid-auto-flow:column;grid-auto-columns:12px;gap:3px;overflow-x:auto;padding-bottom:6px}
    .heat-col{display:grid;grid-template-rows:repeat(7,12px);gap:3px}
    .heat-cell{width:12px;height:12px;border-radius:3px;background:#161b22;position:relative}
    .heat-labels{display:grid;grid-template-columns:30px 1fr;gap:6px;margin-top:6px;font-size:10px;color:#8b949e;align-items:center}
    .day-labels{display:grid;grid-template-rows:repeat(7,12px);gap:3px}
    .months{display:grid;grid-auto-flow:column;grid-auto-columns:12px;gap:3px;margin-left:30px;font-size:10px;color:#8b949e;margin-bottom:6px}
    .tooltip{position:fixed;z-index:10;background:#111827;color:#e2e8f0;border:1px solid #374151;border-radius:6px;padding:6px 8px;font-size:11px;pointer-events:none;opacity:0;transform:translateY(4px);transition:all .15s ease}
    .heat-stats{display:grid;gap:8px;margin-top:10px;font-size:12px;color:var(--muted)}
    .heat-stats strong{color:#e2e8f0;font-size:14px}

    /* Stats */
    .ring{width:160px;height:160px;border-radius:50%;background:conic-gradient(var(--accent) 0deg,#334155 0deg);display:grid;place-items:center;margin:0 auto;position:relative}
    .ring:after{content:"";position:absolute;inset:12px;background:var(--bg);border-radius:50%}
    .ring-content{position:relative;z-index:1;text-align:center}
    .ring-content h2{margin:0;font-size:28px}
    .ring-content span{font-size:12px;color:var(--muted)}
    .macro-bars{display:grid;gap:10px;margin-top:14px}
    .macro label{font-size:12px;color:var(--muted);display:flex;justify-content:space-between}
    .bar{height:8px;background:#334155;border-radius:999px;overflow:hidden}
    .bar>span{display:block;height:100%;width:0;border-radius:999px;transition:width .6s ease}
    .protein{background:#38bdf8}.carbs{background:#f97316}.fat{background:#a855f7}
    canvas{width:100%!important;height:220px!important}

    /* Nav */
    .nav{position:fixed;left:0;right:0;bottom:0;background:rgba(15,23,42,.85);border-top:1px solid #1f2937;display:flex;justify-content:space-around;padding:10px 8px;backdrop-filter:blur(12px)}
    .nav button{background:none;border:none;color:var(--muted);font-size:12px;display:grid;gap:4px;place-items:center}
    .nav button.active{color:var(--accent)}

    .empty{text-align:center;margin-top:60px}
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <div>
        <div class="brand">🥗 FitSorted</div>
        <div id="userName" class="muted" style="font-size:12px">Loading...</div>
      </div>
      <div class="pill" id="todayDate"></div>
    </header>

    <section id="receipt" class="section active">
      <div class="receipt-wrap">
        <div class="receipt" id="receiptCard">
          <h1>FITSORTED</h1>
          <div class="date" id="receiptDate">--</div>
          <div class="dash"></div>
          <div id="receiptItems"></div>
          <div class="dots"></div>
          <div class="macro-list" id="receiptMacros"></div>
          <div class="dash"></div>
          <div class="row total"><span>TOTAL</span><span id="receiptTotal">0 cal</span></div>
          <div class="budget" id="receiptBudget"></div>
          <div class="dots"></div>
          <div class="tip"><span>💡</span><span id="receiptTip"></span></div>
          <div class="receipt-footer">#FitSorted 🥗</div>
          <div class="tear"></div>
        </div>
      </div>
    </section>

    <section id="heatmap" class="section">
      <div class="card" style="margin-bottom:12px">
        <h3 style="margin:0 0 6px">Year at a glance</h3>
        <div class="muted" style="font-size:12px">GitHub-style calorie map</div>
      </div>
      <div class="heatmap-card">
        <div class="months" id="monthLabels"></div>
        <div class="heat-labels">
          <div class="day-labels">
            <div>M</div><div></div><div>W</div><div></div><div>F</div><div></div><div></div>
          </div>
          <div class="heatmap" id="heatmapGrid"></div>
        </div>
        <div class="heat-stats" id="heatStats"></div>
      </div>
      <div class="tooltip" id="tooltip"></div>
    </section>

    <section id="stats" class="section">
      <div class="card">
        <div class="ring" id="calorieRing">
          <div class="ring-content">
            <h2 id="remainingCalories">--</h2>
            <span>kcal left</span>
          </div>
        </div>
        <div class="macro-bars">
          <div class="macro">
            <label><span>Protein</span><span id="proteinVal">0g</span></label>
            <div class="bar"><span class="protein" id="proteinBar"></span></div>
          </div>
          <div class="macro">
            <label><span>Carbs</span><span id="carbsVal">0g</span></label>
            <div class="bar"><span class="carbs" id="carbsBar"></span></div>
          </div>
          <div class="macro">
            <label><span>Fat</span><span id="fatVal">0g</span></label>
            <div class="bar"><span class="fat" id="fatBar"></span></div>
          </div>
        </div>
      </div>
      <div class="card" style="margin-top:12px"><canvas id="weeklyChart"></canvas></div>
      <div class="card" style="margin-top:12px"><canvas id="weightChart"></canvas></div>
    </section>

    <section id="profile" class="section">
      <div class="card" id="profileCard"></div>
    </section>

    <div id="emptyState" class="empty" style="display:none;">
      <h3>Open this link from your FitSorted WhatsApp chat to see your dashboard 🥗</h3>
      <p class="muted">WhatsApp: +27690684940</p>
    </div>
  </div>

  <nav class="nav">
    <button data-target="receipt" class="active">🧾<span>Receipt</span></button>
    <button data-target="heatmap">🟩<span>Heatmap</span></button>
    <button data-target="stats">📊<span>Stats</span></button>
    <button data-target="profile">👤<span>Profile</span></button>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script>
    const $ = (id) => document.getElementById(id);
    const fmtDate = (d) => new Date(d).toLocaleDateString('en-ZA', { weekday: 'short', month: 'short', day: 'numeric', year:'numeric' });
    const token = new URLSearchParams(location.search).get('t');

    function showEmpty(){
      document.querySelectorAll('.section').forEach(s=>s.style.display='none');
      $('emptyState').style.display='block';
    }

    function setRing(percent){
      const deg = Math.min(100, Math.max(0, percent)) * 3.6;
      $('calorieRing').style.background = `conic-gradient(var(--accent) ${deg}deg, #334155 ${deg}deg)`;
    }

    function animateNumber(el, to){
      const start = 0; const dur = 700; const startTime = performance.now();
      function tick(t){
        const p = Math.min(1, (t-startTime)/dur);
        el.textContent = Math.round(start + (to-start)*p);
        if(p<1) requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
    }

    function tipLogic(entries, totals, goal){
      const foods = entries.map(e => (e.food||'').toLowerCase());
      const hasAlcohol = foods.some(f => /beer|wine|whisky|vodka|gin|rum|cider|tequila|brandy/.test(f));
      const hasFastFood = foods.some(f => /(mcdonalds|kfc|steers|nandos)/.test(f));
      if(entries.length <= 2) return "This can't be everything... right?";
      if(hasAlcohol) return "The liquid calories hit different, don't they?";
      if(hasFastFood) return "At least you tracked it. That's more than most.";
      const diff = totals.calories - goal;
      if(diff <= 0 && totals.protein > 100) return "Clean eating machine. Your gym bro is proud.";
      if(diff <= 0) return "Under budget. The discipline is showing.";
      if(diff < 200) return "Slightly over. We'll call it a maintenance day.";
      return "The calories were generous today. Tomorrow's a new receipt.";
    }

    function colorFor(cal, goal){
      if(cal === null) return '#161b22';
      const diff = goal - cal;
      if(diff >= 0){
        const r = diff / goal;
        if(r > 0.5) return '#39d353';
        if(r > 0.3) return '#26a641';
        if(r > 0.15) return '#006d32';
        return '#0e4429';
      } else {
        const o = Math.abs(diff) / goal;
        if(o > 0.35) return '#d32f2f';
        if(o > 0.2) return '#8b1a1a';
        return '#4a0e0e';
      }
    }

    function buildHeatmap(logSummary, goal){
      const byDate = new Map(logSummary.map(d => [d.date, d.totals.calories]));
      const end = new Date(logSummary[logSummary.length-1].date);
      const start = new Date(end); start.setDate(start.getDate() - 364);
      const startDay = (start.getDay() + 6) % 7; // Monday=0
      start.setDate(start.getDate() - startDay);

      const weeks = [];
      const monthLabels = [];
      let cursor = new Date(start);
      for(let w=0; w<53; w++){
        const week = [];
        for(let d=0; d<7; d++){
          const key = cursor.toISOString().slice(0,10);
          week.push({
            date: key,
            calories: byDate.has(key) ? byDate.get(key) : null,
            month: cursor.getMonth(),
            label: cursor.toLocaleDateString('en-ZA', { month:'short' })
          });
          cursor.setDate(cursor.getDate()+1);
        }
        weeks.push(week);
      }

      // Month labels
      let lastMonth = -1;
      weeks.forEach((week, i) => {
        const m = week[0].month;
        if(m !== lastMonth){
          monthLabels.push({ index: i, label: week[0].label });
          lastMonth = m;
        }
      });

      const grid = $('heatmapGrid');
      grid.innerHTML = '';
      weeks.forEach(week => {
        const col = document.createElement('div');
        col.className = 'heat-col';
        week.forEach(day => {
          const cell = document.createElement('div');
          cell.className = 'heat-cell';
          cell.style.background = colorFor(day.calories, goal);
          cell.dataset.date = day.date;
          cell.dataset.calories = day.calories;
          col.appendChild(cell);
        });
        grid.appendChild(col);
      });

      const months = $('monthLabels');
      months.innerHTML = '';
      const totalWeeks = weeks.length;
      for(let i=0;i<totalWeeks;i++){
        const label = monthLabels.find(m => m.index === i);
        const span = document.createElement('div');
        span.textContent = label ? label.label : '';
        months.appendChild(span);
      }
    }

    function bindTooltip(){
      const tooltip = $('tooltip');
      document.addEventListener('mousemove', (e) => {
        if(!e.target.classList.contains('heat-cell')) return;
        const date = e.target.dataset.date;
        const calories = e.target.dataset.calories;
        tooltip.innerHTML = `<strong>${fmtDate(date)}</strong><br>${calories ? calories + ' cal' : 'No data'}`;
        tooltip.style.opacity = 1;
        tooltip.style.left = (e.clientX + 12) + 'px';
        tooltip.style.top = (e.clientY + 12) + 'px';
      });
      document.addEventListener('mouseout', (e) => {
        if(e.target.classList.contains('heat-cell')) tooltip.style.opacity = 0;
      });
    }

    function calcStreak(dates){
      const set = new Set(dates);
      let streak = 0;
      let day = new Date(dates[dates.length - 1]);
      while(set.has(day.toISOString().slice(0,10))){
        streak++; day.setDate(day.getDate()-1);
      }
      return streak;
    }

    async function load(){
      if(!token) return showEmpty();
      try{
        const res = await fetch(`./data/${token}.json`);
        if(!res.ok) return showEmpty();
        const data = await res.json();
        const logSummary = data.logSummary || [];
        if(!logSummary.length) return showEmpty();

        const dates = logSummary.map(d=>d.date).sort();
        const today = dates.includes(new Date().toISOString().slice(0,10)) ? new Date().toISOString().slice(0,10) : dates[dates.length-1];
        const todayLog = logSummary.find(d=>d.date===today) || logSummary[logSummary.length-1];

        const goal = data.goal || 2000;
        const eaten = todayLog.totals.calories || 0;
        const remaining = Math.max(goal - eaten, 0);

        $('userName').textContent = `${data.name || 'FitSorted Member'} • Goal ${goal} kcal`;
        $('todayDate').textContent = fmtDate(today);
        $('receiptDate').textContent = fmtDate(today);
        animateNumber($('remainingCalories'), remaining);
        setRing((eaten/goal)*100);

        const items = $('receiptItems');
        items.innerHTML = '';
        todayLog.entries.forEach(e => {
          const row = document.createElement('div');
          row.className = 'row';
          row.innerHTML = `<span>${e.food}</span><span>${e.calories}</span>`;
          items.appendChild(row);
        });

        $('receiptTotal').textContent = `${eaten} cal`;
        $('receiptMacros').innerHTML = `
          <div class="row"><span>PROTEIN</span><span>${todayLog.totals.protein}g</span></div>
          <div class="row"><span>CARBS</span><span>${todayLog.totals.carbs}g</span></div>
          <div class="row"><span>FAT</span><span>${todayLog.totals.fat}g</span></div>
        `;
        $('receiptBudget').innerHTML = `
          <div class="row"><span>BUDGET</span><span>${goal.toLocaleString()} cal</span></div>
          <div class="row"><span>SPENT</span><span>${eaten.toLocaleString()} cal</span></div>
          <div class="row"><span>REMAINING</span><span>${(goal-eaten).toLocaleString()} cal</span></div>
        `;
        $('receiptTip').textContent = tipLogic(todayLog.entries, todayLog.totals, goal);

        // Macro bars
        const macroTotal = todayLog.totals.protein + todayLog.totals.carbs + todayLog.totals.fat || 1;
        const pPct = (todayLog.totals.protein / macroTotal) * 100;
        const cPct = (todayLog.totals.carbs / macroTotal) * 100;
        const fPct = (todayLog.totals.fat / macroTotal) * 100;
        $('proteinVal').textContent = `${todayLog.totals.protein}g`;
        $('carbsVal').textContent = `${todayLog.totals.carbs}g`;
        $('fatVal').textContent = `${todayLog.totals.fat}g`;
        requestAnimationFrame(()=>{
          $('proteinBar').style.width = `${pPct}%`;
          $('carbsBar').style.width = `${cPct}%`;
          $('fatBar').style.width = `${fPct}%`;
        });

        // Heatmap
        buildHeatmap(logSummary, goal);
        bindTooltip();
        const totalDays = logSummary.length;
        const avgCals = Math.round(logSummary.reduce((a,d)=>a+d.totals.calories,0)/totalDays);
        const streak = calcStreak(dates);
        $('heatStats').innerHTML = `
          <div>Total days logged <strong>${totalDays}</strong></div>
          <div>Longest streak <strong>${streak} days</strong></div>
          <div>Avg calories <strong>${avgCals}</strong></div>
        `;

        // Weekly chart
        const last7 = logSummary.slice(-7);
        const labels = last7.map(d => new Date(d.date).toLocaleDateString('en-ZA', { weekday: 'short' }));
        const calories = last7.map(d => d.totals.calories);
        const colors = calories.map(c => c <= goal ? '#22c55e' : '#ef4444');
        new Chart($('weeklyChart'), {
          type:'bar',
          data:{labels,datasets:[{data:calories,backgroundColor:colors,borderRadius:6},{data:calories.map(()=>goal),type:'line',borderColor:'#94a3b8',borderDash:[6,6],pointRadius:0}]},
          options:{plugins:{legend:{display:false}},scales:{y:{grid:{color:'#1f2937'},ticks:{color:'#94a3b8'}},x:{ticks:{color:'#94a3b8'},grid:{display:false}}}}
        });

        // Weight chart
        const weights = Array.isArray(data.weights) ? data.weights : [];
        const weightLabels = weights.map(w => w.date || w.time?.slice(0,10));
        const weightVals = weights.map(w => w.kg || w.weight || 0);
        const datasets = [{label:'Weight',data:weightVals,borderColor:'#22c55e',tension:.3}];
        const targetWeight = data.profile?.targetWeight || data.profile?.goalWeight || data.profile?.targetKg;
        if(targetWeight) datasets.push({label:'Target',data:weightVals.map(()=>targetWeight),borderColor:'#94a3b8',borderDash:[6,6],pointRadius:0});
        new Chart($('weightChart'), {
          type:'line',
          data:{labels:weightLabels,datasets},
          options:{plugins:{legend:{display:false}},scales:{y:{ticks:{color:'#94a3b8'},grid:{color:'#1f2937'}},x:{ticks:{color:'#94a3b8'},grid:{display:false}}}}
        });

        // Profile
        $('profileCard').innerHTML = `
          <h3 style="margin-top:0">Profile</h3>
          <p class="muted">${data.profile?.gender || '-'} • ${data.profile?.age || '-'} yrs</p>
          <div class="row" style="margin-top:6px"><span>Weight</span><strong>${data.profile?.weight || '-'} kg</strong></div>
          <div class="row" style="margin-top:6px"><span>Height</span><strong>${data.profile?.height || '-'} cm</strong></div>
          <div class="row" style="margin-top:6px"><span>Target</span><strong>${data.profile?.target || '-'} </strong></div>
        `;
      }catch(e){showEmpty();}
    }

    document.querySelectorAll('.nav button').forEach(btn=>{
      btn.addEventListener('click',()=>{
        document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
        const target = document.getElementById(btn.dataset.target);
        if(target) target.classList.add('active');
        window.scrollTo({top:0,behavior:'smooth'});
      });
    });

    load();
  </script>
</body>
</html>
