<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080, height=1920, initial-scale=1">
  <title>FitSorted Story - Day 1</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 1080px;
      height: 1920px;
      background: linear-gradient(135deg, #0a0f0d 0%, #1a2520 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      color: #e7f7ea;
      position: relative;
      overflow: hidden;
    }
    
    /* Subtle background pattern */
    body::before {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(circle at 20% 30%, rgba(46, 234, 122, 0.05) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(46, 234, 122, 0.03) 0%, transparent 50%);
      z-index: 0;
    }

    .content {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 120px 80px;
      max-width: 100%;
    }

    .icon {
      font-size: 180px;
      margin-bottom: 60px;
      filter: drop-shadow(0 8px 24px rgba(46, 234, 122, 0.3));
    }

    h1 {
      font-size: 88px;
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: 40px;
      color: #ffffff;
      letter-spacing: -0.02em;
    }

    .highlight {
      color: #2eea7a;
      display: block;
      margin-top: 20px;
    }

    .tagline {
      font-size: 56px;
      font-weight: 400;
      line-height: 1.4;
      color: #9bb3a6;
      margin-bottom: 80px;
    }

    .features {
      display: flex;
      flex-direction: column;
      gap: 32px;
      margin-bottom: 100px;
      text-align: left;
    }

    .feature {
      display: flex;
      align-items: center;
      gap: 28px;
      font-size: 48px;
      color: #e7f7ea;
    }

    .feature::before {
      content: '✓';
      display: flex;
      align-items: center;
      justify-content: center;
      width: 64px;
      height: 64px;
      background: #2eea7a;
      color: #0a0f0d;
      border-radius: 50%;
      font-weight: 800;
      font-size: 42px;
      flex-shrink: 0;
    }

    .cta {
      font-size: 42px;
      font-weight: 700;
      color: #2eea7a;
      background: rgba(46, 234, 122, 0.1);
      border: 3px solid #2eea7a;
      padding: 28px 60px;
      border-radius: 60px;
      display: inline-block;
      margin-top: 40px;
      letter-spacing: 0.02em;
    }

    .footer {
      position: absolute;
      bottom: 80px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 38px;
      color: #9bb3a6;
    }

    .logo {
      font-size: 52px;
      font-weight: 700;
      color: #2eea7a;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="content">
    <div class="icon">💬</div>
    
    <h1>
      Free Forever
      <span class="highlight">Calorie Tracker</span>
    </h1>
    
    <div class="tagline">
      On WhatsApp
    </div>

    <div class="features">
      <div class="feature">No apps</div>
      <div class="feature">No logins</div>
      <div class="feature">Just message</div>
    </div>

    <div class="cta">
      Try FitSorted →
    </div>
  </div>

  <div class="footer">
    <div class="logo">FitSorted</div>
    <div>wa.me/27690684940</div>
  </div>
</body>
</html>
