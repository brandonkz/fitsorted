<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-GMW4LWNXK1"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag("js", new Date());
    gtag("config", "G-GMW4LWNXK1");
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FitSorted Food Logs</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; padding: 20px; }
    .container { max-width: 1400px; margin: 0 auto; }
    h1 { font-size: 32px; margin-bottom: 8px; color: #22c55e; }
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin: 24px 0; }
    .stat-card { background: #1e293b; border-radius: 12px; padding: 20px; border: 1px solid #334155; }
    .stat-label { font-size: 14px; color: #94a3b8; margin-bottom: 8px; }
    .stat-value { font-size: 32px; font-weight: 700; color: #22c55e; }
    .filters { background: #1e293b; border-radius: 12px; padding: 20px; margin-bottom: 24px; border: 1px solid #334155; }
    .filter-row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
    input, select { background: #0f172a; border: 1px solid #334155; color: #e2e8f0; padding: 10px 16px; border-radius: 8px; font-size: 14px; }
    input { flex: 1; min-width: 250px; }
    select { min-width: 150px; }
    button { background: #22c55e; color: #0f172a; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; }
    button:hover { background: #16a34a; }
    table { width: 100%; background: #1e293b; border-radius: 12px; overflow: hidden; border: 1px solid #334155; }
    thead { background: #0f172a; }
    th, td { padding: 12px 16px; text-align: left; border-bottom: 1px solid #334155; }
    th { font-weight: 600; color: #94a3b8; font-size: 12px; text-transform: uppercase; }
    tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: #334155; }
    .source-badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
    .source-ai { background: #3b82f6; color: white; }
    .source-manual { background: #f59e0b; color: white; }
    .source-db { background: #10b981; color: white; }
    .export-btn { background: #3b82f6; margin-left: 8px; }
    .export-btn:hover { background: #2563eb; }
    .loading { text-align: center; padding: 40px; color: #94a3b8; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🥗 FitSorted Food Logs</h1>
    <p style="color: #94a3b8; margin-bottom: 24px;">All food entries from all users</p>

    <div class="stats" id="stats"></div>

    <div class="filters">
      <div class="filter-row">
        <input type="text" id="searchInput" placeholder="Search food name, user, phone...">
        <input type="date" id="dateFilter" value="">
        <select id="sourceFilter">
          <option value="">All Sources</option>
          <option value="AI">AI</option>
          <option value="Manual">Manual</option>
          <option value="DB">Database</option>
        </select>
        <button onclick="applyFilters()">Filter</button>
        <button class="export-btn" onclick="exportCSV()">Export CSV</button>
      </div>
    </div>

    <div id="loading" class="loading">Loading food logs...</div>
    <table id="logsTable" style="display:none;">
      <thead>
        <tr>
          <th>Timestamp</th>
          <th>User</th>
          <th>Food</th>
          <th>Calories</th>
          <th>Protein</th>
          <th>Carbs</th>
          <th>Fat</th>
          <th>Fibre</th>
          <th>Source</th>
        </tr>
      </thead>
      <tbody id="logsBody"></tbody>
    </table>
  </div>

  <script>
    let allLogs = [];
    let filteredLogs = [];

    async function loadLogs() {
      try {
        const response = await fetch('logs-data.json');
        allLogs = await response.json();
        
        let uniqueUsers = new Set();
        let today = new Date().toISOString().split('T')[0];
        let todayEntries = 0;
        let totalCalories = 0;

        allLogs.forEach(log => {
          uniqueUsers.add(log.phone);
          totalCalories += log.calories;
          if (log.date === today) todayEntries++;
        });
        
        // Update stats
        document.getElementById('stats').innerHTML = `
          <div class="stat-card">
            <div class="stat-label">Total Entries</div>
            <div class="stat-value">${allLogs.length.toLocaleString()}</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Unique Users</div>
            <div class="stat-value">${uniqueUsers.size}</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Today's Entries</div>
            <div class="stat-value">${todayEntries}</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Total Calories Logged</div>
            <div class="stat-value">${(totalCalories / 1000000).toFixed(1)}M</div>
          </div>
        `;

        // Set default date to today
        document.getElementById('dateFilter').value = today;
        
        applyFilters();
        document.getElementById('loading').style.display = 'none';
        document.getElementById('logsTable').style.display = 'table';
      } catch (err) {
        document.getElementById('loading').textContent = 'Error loading logs: ' + err.message;
      }
    }

    function applyFilters() {
      const search = document.getElementById('searchInput').value.toLowerCase();
      const date = document.getElementById('dateFilter').value;
      const source = document.getElementById('sourceFilter').value;

      filteredLogs = allLogs.filter(log => {
        const matchesSearch = !search || 
          log.food.toLowerCase().includes(search) ||
          log.phone.includes(search) ||
          log.userId.toLowerCase().includes(search);
        
        const matchesDate = !date || log.date === date;
        const matchesSource = !source || log.source === source;

        return matchesSearch && matchesDate && matchesSource;
      });

      renderTable();
    }

    function renderTable() {
      const tbody = document.getElementById('logsBody');
      tbody.innerHTML = filteredLogs.slice(0, 500).map(log => `
        <tr>
          <td>${new Date(log.timestamp).toLocaleString()}</td>
          <td>${log.phone.slice(-4)}</td>
          <td>${log.food}</td>
          <td>${log.calories}</td>
          <td>${log.protein}g</td>
          <td>${log.carbs}g</td>
          <td>${log.fat}g</td>
          <td>${log.fibre}g</td>
          <td><span class="source-badge source-${log.source.toLowerCase()}">${log.source}</span></td>
        </tr>
      `).join('');
      
      if (filteredLogs.length > 500) {
        tbody.innerHTML += `<tr><td colspan="9" style="text-align:center; color: #94a3b8; padding: 20px;">Showing first 500 of ${filteredLogs.length} results</td></tr>`;
      }
    }

    function exportCSV() {
      const headers = ['Timestamp', 'Phone', 'User ID', 'Food', 'Calories', 'Protein', 'Carbs', 'Fat', 'Fibre', 'Source'];
      const rows = filteredLogs.map(log => [
        log.timestamp,
        log.phone,
        log.userId,
        log.food.replace(/"/g, '""'),
        log.calories,
        log.protein,
        log.carbs,
        log.fat,
        log.fibre,
        log.source
      ]);
      
      const csv = [headers, ...rows].map(row => row.map(cell => `"${cell}"`).join(',')).join('\n');
      const blob = new Blob([csv], { type: 'text/csv' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `fitsorted-logs-${new Date().toISOString().split('T')[0]}.csv`;
      a.click();
    }

    loadLogs();
  </script>
</body>
</html>
