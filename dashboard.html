<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FitSorted - User Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      padding: 20px;
    }
    .container { max-width: 1200px; margin: 0 auto; }
    h1 { font-size: 24px; color: #22c55e; margin-bottom: 4px; }
    .subtitle { color: #64748b; margin-bottom: 24px; font-size: 14px; }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: #1e293b;
      border-radius: 12px;
      padding: 16px;
      text-align: center;
    }
    .stat-card .number { font-size: 28px; font-weight: bold; color: #22c55e; }
    .stat-card .label { font-size: 12px; color: #64748b; margin-top: 4px; }
    .user-card {
      background: #1e293b;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 16px;
      align-items: start;
    }
    .user-card:hover { background: #253347; }
    .user-name { font-size: 18px; font-weight: 600; color: #f1f5f9; }
    .user-phone { font-size: 13px; color: #64748b; margin-top: 2px; }
    .user-meta { font-size: 13px; color: #94a3b8; line-height: 1.8; }
    .user-meta strong { color: #e2e8f0; }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }
    .badge-active { background: #166534; color: #86efac; }
    .badge-inactive { background: #7f1d1d; color: #fca5a5; }
    .badge-pro { background: #7c3aed; color: #ddd6fe; }
    .badge-trial { background: #1e40af; color: #93c5fd; }
    .top-foods { margin-top: 8px; }
    .food-item {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: #94a3b8;
      padding: 3px 0;
      border-bottom: 1px solid #2d3a4d;
    }
    .food-item:last-child { border-bottom: none; }
    .food-count { color: #22c55e; font-weight: 600; }
    .search {
      width: 100%;
      padding: 10px 16px;
      border-radius: 8px;
      border: 1px solid #334155;
      background: #1e293b;
      color: #e2e8f0;
      font-size: 14px;
      margin-bottom: 16px;
      outline: none;
    }
    .search:focus { border-color: #22c55e; }
    .sort-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .sort-btn {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid #334155;
      background: #1e293b;
      color: #94a3b8;
      font-size: 12px;
      cursor: pointer;
    }
    .sort-btn.active { background: #22c55e; color: #0f172a; border-color: #22c55e; }
    .password-gate {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      gap: 12px;
    }
    .password-gate input {
      padding: 12px 20px;
      border-radius: 8px;
      border: 1px solid #334155;
      background: #1e293b;
      color: #e2e8f0;
      font-size: 16px;
      text-align: center;
      width: 250px;
    }
    .password-gate button {
      padding: 10px 30px;
      border-radius: 8px;
      border: none;
      background: #22c55e;
      color: #0f172a;
      font-weight: 600;
      cursor: pointer;
    }
    @media (max-width: 768px) {
      .user-card { grid-template-columns: 1fr; gap: 8px; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="password-gate" id="gate">
      <h1>🥗 FitSorted Dashboard</h1>
      <p style="color:#64748b;">Enter password</p>
      <input type="password" id="pw" placeholder="Password" onkeydown="if(event.key==='Enter')unlock()">
      <button onclick="unlock()">Enter</button>
    </div>
    <div id="dashboard" style="display:none;">
      <h1>🥗 FitSorted Dashboard</h1>
      <p class="subtitle" id="updated"></p>
      <div class="stats-grid" id="stats-grid"></div>
      <input class="search" type="text" placeholder="Search users..." id="search" oninput="filterUsers()">
      <div class="sort-bar">
        <button class="sort-btn active" onclick="sortBy('logs',this)">Most Logs</button>
        <button class="sort-btn" onclick="sortBy('recent',this)">Recently Active</button>
        <button class="sort-btn" onclick="sortBy('joined',this)">Newest</button>
        <button class="sort-btn" onclick="sortBy('name',this)">Name</button>
      </div>
      <div id="user-list"></div>
    </div>
  </div>
  <script>
    let USERS = []; window.EMBEDDED_DATA = [{"phone":"27837***970","name":"Brandon","goal":1999,"joined":"2026/03/06","totalLogs":85,"daysLogged":10,"lastActive":"2026-03-10","topFoods":[{"food":"toast (white bread, 2 slices) (2 slices)","count":5},{"food":"coffee with milk (1 cup) (1 cup)","count":4},{"food":"coffee","count":4},{"food":"water","count":4},{"food":"chicken","count":3}],"isPro":false,"budget":200,"weight":84,"target":"lose"},{"phone":"27837***590","name":"Mineen","goal":1377,"joined":"2026/03/04","totalLogs":20,"daysLogged":7,"lastActive":"2026-03-10","topFoods":[{"food":"black coffee 1 cup","count":2},{"food":"1x banana, 1x cereal, 1x fat free milk","count":1},{"food":"1x paw paw","count":1},{"food":"1 bowl of pronutro with milk","count":1},{"food":"woolworths sushi 9 piece (1 pack (9pc))","count":1}],"isPro":false,"budget":null,"weight":75,"target":"lose"},{"phone":"27837***111","name":"Not set","goal":2562,"joined":"unknown","totalLogs":9,"daysLogged":1,"lastActive":"2026-03-03","topFoods":[{"food":"3x corn thins","count":1},{"food":"fat free chunky cottage cheese - 120g","count":1},{"food":"avocado - 50g","count":1},{"food":"2x big tomatoes","count":1},{"food":"3x almond flat white","count":1}],"isPro":false,"budget":null,"weight":88,"target":"lose"},{"phone":"27828***893","name":"Robyn","goal":1859,"joined":"2026/03/09","totalLogs":8,"daysLogged":1,"lastActive":"2026-03-10","topFoods":[{"food":"2x dates","count":1},{"food":"2x provita","count":1},{"food":"cheese","count":1},{"food":"milk","count":1},{"food":"salad","count":1}],"isPro":false,"budget":null,"weight":57,"target":"lose"},{"phone":"27824***778","name":"Not set","goal":1204,"joined":"2026/03/04","totalLogs":7,"daysLogged":1,"lastActive":"2026-03-03","topFoods":[{"food":"sea bass fish with rice","count":2},{"food":"americano with almond milk","count":1},{"food":"2x boiled egg, small plate of veggies wi","count":1},{"food":"2x mini caramel magnum ice cream","count":1},{"food":"2x small caramel magnum ice cream","count":1}],"isPro":false,"budget":null,"weight":53,"target":"lose"},{"phone":"27718***067","name":"Shane","goal":2263,"joined":"2026/03/06","totalLogs":6,"daysLogged":1,"lastActive":"2026-03-06","topFoods":[{"food":"steak with tartar sauce and lobster","count":1},{"food":"braai steak (sirloin, 150g) (150g)","count":1},{"food":"lobster 100g","count":1},{"food":"chicken schnitzel","count":1},{"food":"debonairs medium margherita pizza (1 sli","count":1}],"isPro":false,"budget":null,"weight":78,"target":"gain"},{"phone":"27826***201","name":"Not set","goal":1247,"joined":"2026/03/04","totalLogs":5,"daysLogged":2,"lastActive":"2026-03-05","topFoods":[{"food":"1 mug of coffee with almond milk and can","count":1},{"food":"smoked salmon and cream cheese bagel","count":1},{"food":"banana (1 medium) (1 medium)","count":1},{"food":"future life lite protein bar","count":1},{"food":"1x mug of coffee with almond milk and ca","count":1}],"isPro":false,"budget":null,"weight":60,"target":"lose"},{"phone":"27840***566","name":"Not set","goal":1589,"joined":"unknown","totalLogs":1,"daysLogged":1,"lastActive":"2026-03-03","topFoods":[{"food":"bread","count":1}],"isPro":false,"budget":null,"weight":94,"target":"lose"},{"phone":"27732***213","name":"Idan","goal":3299,"joined":"2026/03/05","totalLogs":0,"daysLogged":0,"lastActive":"never","topFoods":[],"isPro":false,"budget":null,"weight":86,"target":"gain"},{"phone":"27721***516","name":"Rael","goal":1603,"joined":"2026/03/09","totalLogs":0,"daysLogged":0,"lastActive":"never","topFoods":[],"isPro":false,"budget":null,"weight":83,"target":"lose"},{"phone":"27729***966","name":"Kyle","goal":2033,"joined":"2026/03/09","totalLogs":0,"daysLogged":0,"lastActive":"never","topFoods":[],"isPro":false,"budget":null,"weight":100,"target":"lose"},{"phone":"27609***906","name":"Meko","goal":3182,"joined":"2026/03/09","totalLogs":0,"daysLogged":0,"lastActive":"never","topFoods":[],"isPro":false,"budget":null,"weight":78,"target":"gain"},{"phone":"97253***354","name":"Avi","goal":1867,"joined":"2026/03/09","totalLogs":0,"daysLogged":0,"lastActive":"never","topFoods":[],"isPro":false,"budget":null,"weight":82,"target":"lose"},{"phone":"23490***603","name":"Ola","goal":1821,"joined":"2026/03/10","totalLogs":0,"daysLogged":0,"lastActive":"never","topFoods":[],"isPro":false,"budget":150,"weight":90,"target":"lose"}];
    const PW = 'fitsorted2026';

    function unlock() {
      if (document.getElementById('pw').value === PW) {
        document.getElementById('gate').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        loadData();
      } else {
        alert('Wrong password');
      }
    }

    async function loadData() {
      try {
        const res = await fetch('/api/dashboard');
        USERS = await res.json();
      } catch {
        // Fallback: load from embedded data
        USERS = window.EMBEDDED_DATA || [];
      }
      renderStats();
      renderUsers();
      document.getElementById('updated').textContent = 'Last updated: ' + new Date().toLocaleString('en-ZA');
    }

    function renderStats() {
      const total = USERS.length;
      const active = USERS.filter(u => u.lastActive >= getDateStr(-7)).length;
      const totalLogs = USERS.reduce((s, u) => s + u.totalLogs, 0);
      const withBudget = USERS.filter(u => u.budget).length;

      document.getElementById('stats-grid').innerHTML = `
        <div class="stat-card"><div class="number">${total}</div><div class="label">Total Users</div></div>
        <div class="stat-card"><div class="number">${active}</div><div class="label">Active (7d)</div></div>
        <div class="stat-card"><div class="number">${totalLogs}</div><div class="label">Total Logs</div></div>
        <div class="stat-card"><div class="number">${withBudget}</div><div class="label">Using Budget</div></div>
      `;
    }

    function renderUsers(filtered) {
      const list = filtered || USERS;
      const today = getDateStr(0);
      document.getElementById('user-list').innerHTML = list.map(u => {
        const isActive = u.lastActive >= getDateStr(-3);
        const statusBadge = isActive
          ? '<span class="badge badge-active">Active</span>'
          : '<span class="badge badge-inactive">Inactive</span>';
        const proBadge = u.isPro ? ' <span class="badge badge-pro">PRO</span>' : ' <span class="badge badge-trial">Trial</span>';
        const topFoodsHtml = u.topFoods.length > 0
          ? u.topFoods.map(f => `<div class="food-item"><span>${f.food}</span><span class="food-count">${f.count}x</span></div>`).join('')
          : '<div style="color:#475569;font-size:12px;">No food logged</div>';
        return `
          <div class="user-card">
            <div>
              <div class="user-name">${u.name} ${statusBadge}${proBadge}</div>
              <div class="user-phone">${u.phone}</div>
              <div class="user-meta" style="margin-top:8px;">
                Joined: <strong>${u.joined}</strong><br>
                Goal: <strong>${u.goal} cal/day</strong><br>
                ${u.weight ? `Weight: <strong>${u.weight}kg</strong><br>` : ''}
                ${u.target ? `Target: <strong>${u.target}</strong><br>` : ''}
                ${u.budget ? `Budget: <strong>R${u.budget}/day</strong><br>` : ''}
              </div>
            </div>
            <div class="user-meta">
              📊 <strong>${u.totalLogs}</strong> total logs<br>
              📅 <strong>${u.daysLogged}</strong> days logged<br>
              🕐 Last: <strong>${u.lastActive}</strong><br>
              ${u.totalLogs > 0 && u.daysLogged > 0 ? `📈 Avg: <strong>${Math.round(u.totalLogs/u.daysLogged)}</strong> logs/day` : ''}
            </div>
            <div>
              <div style="font-size:13px;font-weight:600;margin-bottom:6px;color:#94a3b8;">🍽️ Top Foods</div>
              <div class="top-foods">${topFoodsHtml}</div>
            </div>
          </div>`;
      }).join('');
    }

    function filterUsers() {
      const q = document.getElementById('search').value.toLowerCase();
      if (!q) return renderUsers();
      renderUsers(USERS.filter(u => u.name.toLowerCase().includes(q) || u.phone.includes(q)));
    }

    function sortBy(key, btn) {
      document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      if (key === 'logs') USERS.sort((a, b) => b.totalLogs - a.totalLogs);
      else if (key === 'recent') USERS.sort((a, b) => b.lastActive.localeCompare(a.lastActive));
      else if (key === 'joined') USERS.sort((a, b) => (b.joined || '').localeCompare(a.joined || ''));
      else if (key === 'name') USERS.sort((a, b) => a.name.localeCompare(b.name));
      renderUsers();
    }

    function getDateStr(offsetDays) {
      const d = new Date();
      d.setDate(d.getDate() + offsetDays);
      return d.toISOString().split('T')[0];
    }
  </script>
</body>
</html>
