<!DOCTYPE html><html><head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box;}
body{width:1080px;height:1080px;font-family:-apple-system,system-ui,'Helvetica Neue',sans-serif;overflow:hidden;position:relative;background:#0a0a0a;}
.bg{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 50%, #1a0a00 0%, #0a0500 50%, #000 100%);}
.overlay{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,0.1) 0%,rgba(0,0,0,0.7) 100%);}
.content{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:70px 80px;gap:28px;}
.icon{font-size:80px;}
.headline{font-size:62px;font-weight:900;color:#fff;text-align:center;line-height:1.1;letter-spacing:-1px;}
.sub{font-size:30px;color:rgba(255,255,255,0.5);text-align:center;max-width:700px;line-height:1.5;}
.cta-box{background:linear-gradient(135deg,#ff8c00,#ff5500);border-radius:24px;padding:30px 60px;margin-top:10px;}
.cta-text{font-size:36px;font-weight:900;color:#fff;text-align:center;letter-spacing:1px;}
.cta-sub{font-size:22px;color:rgba(255,255,255,0.8);text-align:center;margin-top:6px;}
.number{font-size:28px;color:rgba(255,140,0,0.8);letter-spacing:1px;margin-top:6px;}
.brand{display:flex;flex-direction:column;align-items:center;gap:8px;margin-top:20px;}
.brand-badge{background:rgba(255,255,255,0.08);border:1.5px solid rgba(255,255,255,0.15);color:#fff;font-size:22px;font-weight:800;letter-spacing:2px;padding:10px 28px;border-radius:40px;}
.dots{display:flex;gap:10px;}
.dot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,0.2);}
.dot.active{background:#ff8c00;width:28px;border-radius:6px;}
</style></head><body>
<div class="bg"></div><div class="overlay"></div>
<div class="content">
  <div class="icon">🏋️</div>
  <div class="headline">Track everything you eat on WhatsApp</div>
  <div class="sub">No app to download. Just message FitSorted and we handle the rest — SA foods, local restaurants, macros.</div>
  <div class="cta-box">
    <div class="cta-text">Try FitSorted FREE for 7 days</div>
    <div class="cta-sub">Then just R49/month 🇿🇦</div>
  </div>
  <div class="number">WhatsApp +27 69 068 4940</div>
  <div class="brand"><div class="brand-badge">🏋️ FITSORTED</div></div>
  <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot active"></div></div>
</div>
</body></html>
