<!DOCTYPE html>
<html><head><meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;600;700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1080px; background: #0a0a0a; font-family: 'Inter', sans-serif; overflow: hidden; padding: 60px; display: flex; flex-direction: column; }
  .brand { display: flex; align-items: center; gap: 12px; margin-bottom: 30px; }
  .brand-dot { width: 14px; height: 14px; background: #25D366; border-radius: 50%; }
  .brand-text { color: #25D366; font-family: 'Anton', sans-serif; font-size: 28px; letter-spacing: 4px; }
  .slide-num { position: absolute; top: 50px; right: 60px; color: rgba(255,255,255,0.3); font-size: 22px; font-weight: 600; }
  .title { color: #25D366; font-family: 'Anton', sans-serif; font-size: 56px; margin-bottom: 10px; }
  .subtitle { color: rgba(255,255,255,0.4); font-size: 24px; margin-bottom: 40px; }
  .steps { flex: 1; display: flex; flex-direction: column; gap: 18px; }
  .step { display: flex; align-items: center; gap: 20px; background: rgba(37,211,102,0.06); border: 1px solid rgba(37,211,102,0.15); border-radius: 16px; padding: 28px 28px; }
  .step-num { color: #25D366; font-family: 'Anton', sans-serif; font-size: 36px; min-width: 40px; }
  .step-text { color: rgba(255,255,255,0.85); font-size: 30px; font-weight: 600; line-height: 1.3; }
  .step-text .green { color: #25D366; font-weight: 800; }
  .step.big { background: rgba(37,211,102,0.12); border-color: rgba(37,211,102,0.3); padding: 32px 28px; }
  .time-tag { display: inline-flex; align-items: center; gap: 8px; background: rgba(37,211,102,0.15); border: 1px solid rgba(37,211,102,0.3); border-radius: 50px; padding: 14px 28px; margin-top: 25px; align-self: center; }
  .time-tag span { color: #25D366; font-size: 26px; font-weight: 700; }
</style></head><body>
  <div class="brand"><div class="brand-dot"></div><span class="brand-text">FITSORTED</span></div>
  <div class="slide-num">3/6</div>
  <div class="title">THE FITSORTED WAY ✅</div>
  <div class="subtitle">What it actually looks like with us</div>
  <div class="steps">
    <div class="step big">
      <span class="step-num">1</span>
      <span class="step-text">Open <span class="green">WhatsApp</span></span>
    </div>
    <div class="step big">
      <span class="step-num">2</span>
      <span class="step-text">Type <span class="green">"Nando's quarter chicken and chips"</span></span>
    </div>
    <div class="step big">
      <span class="step-num">3</span>
      <span class="step-text">Done. <span class="green">AI does the rest.</span></span>
    </div>
  </div>
  <div class="time-tag"><span>⚡ 5 seconds per meal</span></div>
</body></html>
