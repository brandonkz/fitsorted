<!DOCTYPE html><html><head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box;}
body{width:1080px;height:1350px;font-family:-apple-system,system-ui,sans-serif;overflow:hidden;background:#fff;color:#1a1a2e;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:60px 80px;}
.tag{background:rgba(245,158,11,0.15);color:#d97706;font-size:22px;font-weight:700;padding:8px 24px;border-radius:50px;letter-spacing:2px;margin-bottom:30px;}
h2{font-size:42px;font-weight:800;margin-bottom:40px;}
.item{display:flex;align-items:center;justify-content:space-between;width:100%;max-width:900px;padding:22px 30px;background:#f9fafb;border-radius:16px;margin-bottom:14px;border:1px solid #eee;}
.item.warn{border-color:rgba(239,68,68,0.3);background:rgba(239,68,68,0.04);}
.left{display:flex;align-items:center;gap:16px;}
.rank{font-size:24px;font-weight:800;color:#d97706;width:34px;}
.food{font-size:28px;font-weight:600;}
.right{display:flex;align-items:center;gap:14px;}
.cal{font-size:26px;font-weight:700;}
.note{font-size:18px;color:#888;font-weight:600;}
.num{position:absolute;bottom:40px;right:60px;font-size:26px;color:#ccc;font-weight:700;}
</style></head><body>
<div class="tag">🟡 MID-RANGE</div>
<h2>Decent options — just watch portions</h2>
<div class="item"><div class="left"><span class="rank">2</span><span class="food">Thai Green Curry</span></div><div class="right"><span class="cal">350 cal</span><span class="note">Watch the rice</span></div></div>
<div class="item"><div class="left"><span class="rank">3</span><span class="food">Butter Chicken + Rice</span></div><div class="right"><span class="cal">380 cal</span><span class="note">Solid choice</span></div></div>
<div class="item"><div class="left"><span class="rank">4</span><span class="food">Cottage Pie</span></div><div class="right"><span class="cal">420 cal</span><span class="note">Comfort food</span></div></div>
<div class="item warn"><div class="left"><span class="rank">5</span><span class="food">Mac & Cheese</span></div><div class="right"><span class="cal">480 cal</span><span class="note">Cheesy trap</span></div></div>
<div class="num">3/6</div>
</body></html>
