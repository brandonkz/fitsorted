<!DOCTYPE html><html><head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box;}
body{width:1080px;height:1350px;font-family:-apple-system,system-ui,sans-serif;overflow:hidden;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);color:#fff;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:80px;}
.tag{background:rgba(139,92,246,0.2);border:1px solid rgba(139,92,246,0.4);color:#a78bfa;font-size:24px;font-weight:700;padding:10px 30px;border-radius:50px;letter-spacing:2px;margin-bottom:40px;}
.emoji{font-size:90px;margin-bottom:40px;}
h1{font-size:68px;font-weight:900;line-height:1.12;margin-bottom:30px;text-transform:uppercase;}
h1 .hl{color:#a78bfa;}
.sub{font-size:36px;color:rgba(255,255,255,0.6);margin-bottom:60px;}
.swipe{font-size:28px;color:rgba(255,255,255,0.4);font-weight:600;margin-top:40px;}
.swipe span{color:#a78bfa;}
</style></head><body>
<div class="tag">WOOLIES GUIDE</div>
<div class="emoji">🛒</div>
<h1>Woolies Ready Meals<br><span class="hl">Ranked by Calories</span></h1>
<div class="sub">Best to worst. No BS.</div>
<div class="swipe">Swipe → <span>to see the ranking</span></div>
</body></html>
