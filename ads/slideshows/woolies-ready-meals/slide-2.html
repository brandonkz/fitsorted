<!DOCTYPE html><html><head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box;}
body{width:1080px;height:1350px;font-family:-apple-system,system-ui,sans-serif;overflow:hidden;background:#fff;color:#1a1a2e;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:80px;}
.tag{background:rgba(34,197,94,0.15);color:#16a34a;font-size:22px;font-weight:700;padding:8px 24px;border-radius:50px;letter-spacing:2px;margin-bottom:30px;}
.meal{font-size:52px;font-weight:800;margin-bottom:8px;}
.desc{font-size:28px;color:#888;margin-bottom:40px;}
.circle{width:340px;height:340px;border-radius:50%;background:linear-gradient(135deg,#22c55e,#16a34a);display:flex;flex-direction:column;justify-content:center;align-items:center;margin-bottom:40px;box-shadow:0 20px 60px rgba(34,197,94,0.25);}
.cal-num{font-size:96px;font-weight:900;color:#fff;}
.cal-lbl{font-size:30px;color:rgba(255,255,255,0.85);font-weight:600;}
.ctx{font-size:28px;color:#888;padding:16px 36px;background:#f5f5f5;border-radius:14px;margin-top:10px;}
.verdict{font-size:30px;font-weight:700;color:#16a34a;margin-top:30px;}
.num{position:absolute;bottom:40px;right:60px;font-size:26px;color:#ccc;font-weight:700;}
.flame{position:absolute;top:40px;right:60px;font-size:50px;}
</style></head><body>
<div class="tag">✅ BEST PICK</div>
<div class="flame">🥗</div>
<div class="meal">Chicken Stir Fry</div>
<div class="desc">Veggies + lean protein</div>
<div class="circle"><div class="cal-num">280</div><div class="cal-lbl">calories</div></div>
<div class="ctx">🏃‍♀️ = 28 min run to burn it off</div>
<div class="verdict">Lowest cal. Easy winner.</div>
<div class="num">2/6</div>
</body></html>
