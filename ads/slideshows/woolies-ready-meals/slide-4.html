<!DOCTYPE html><html><head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box;}
body{width:1080px;height:1350px;font-family:-apple-system,system-ui,sans-serif;overflow:hidden;background:#fff;color:#1a1a2e;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:60px 80px;}
.tag{background:rgba(239,68,68,0.12);color:#dc2626;font-size:22px;font-weight:700;padding:8px 24px;border-radius:50px;letter-spacing:2px;margin-bottom:30px;}
h2{font-size:42px;font-weight:800;margin-bottom:40px;}
.item{display:flex;align-items:center;justify-content:space-between;width:100%;max-width:900px;padding:22px 30px;background:rgba(239,68,68,0.04);border-radius:16px;margin-bottom:14px;border:1px solid rgba(239,68,68,0.2);}
.left{display:flex;align-items:center;gap:16px;}
.rank{font-size:24px;font-weight:800;color:#dc2626;width:34px;}
.food{font-size:28px;font-weight:600;}
.right{display:flex;align-items:center;gap:14px;}
.cal{font-size:26px;font-weight:700;color:#dc2626;}
.note{font-size:18px;color:#888;font-weight:600;}
.warn{font-size:26px;color:#dc2626;font-weight:700;margin-top:30px;padding:20px 36px;background:rgba(239,68,68,0.08);border-radius:14px;}
.num{position:absolute;bottom:40px;right:60px;font-size:26px;color:#ccc;font-weight:700;}
</style></head><body>
<div class="tag">🔴 CALORIE BOMBS</div>
<h2>These are doing more damage than you think</h2>
<div class="item"><div class="left"><span class="rank">6</span><span class="food">Chicken Schnitzel</span></div><div class="right"><span class="cal">520 cal</span><span class="note">The crumb adds up</span></div></div>
<div class="item"><div class="left"><span class="rank">7</span><span class="food">Lasagne</span></div><div class="right"><span class="cal">560 cal</span><span class="note">Share it</span></div></div>
<div class="item"><div class="left"><span class="rank">8</span><span class="food">Chicken Alfredo</span></div><div class="right"><span class="cal">600 cal</span><span class="note">Cream overload</span></div></div>
<div class="warn">⚠️ Alfredo = 2x the Stir Fry. Same shelf.</div>
<div class="num">4/6</div>
</body></html>
