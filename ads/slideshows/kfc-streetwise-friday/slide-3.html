<!DOCTYPE html>
<html>
<head>
<style>
body {
  margin: 0;
  width: 1080px;
  height: 1920px;
  background: #1a1a1a;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
}
.container {
  width: 880px;
  padding: 60px;
  text-align: center;
}
.title {
  font-size: 95px;
  font-weight: 800;
  color: white;
  margin-bottom: 80px;
  line-height: 1.2;
}
.stat {
  background: linear-gradient(135deg, #2a2a2a 0%, #1f1f1f 100%);
  border-radius: 40px;
  padding: 80px 60px;
  margin-bottom: 50px;
  border-left: 8px solid #10b981;
}
.stat-number {
  font-size: 140px;
  font-weight: 900;
  color: #10b981;
  line-height: 1;
  margin-bottom: 20px;
}
.stat-label {
  font-size: 65px;
  font-weight: 600;
  color: rgba(255,255,255,0.9);
  line-height: 1.3;
}
.note {
  font-size: 55px;
  color: rgba(255,255,255,0.6);
  line-height: 1.5;
  margin-top: 60px;
}
</style>
</head>
<body>
<div class="container">
  <div class="title">That's... 🤯</div>
  
  <div class="stat">
    <div class="stat-number">37%</div>
    <div class="stat-label">of your daily budget<br>(if you're on 2,000 cal)</div>
  </div>
  
  <div class="stat">
    <div class="stat-number">49%</div>
    <div class="stat-label">if you're cutting<br>(1,500 cal/day)</div>
  </div>
  
  <div class="note">Half your daily calories.<br>In one meal. 😬</div>
</div>
</body>
</html>
