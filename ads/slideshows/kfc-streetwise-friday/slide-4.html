<!DOCTYPE html>
<html>
<head>
<style>
body {
  margin: 0;
  width: 1080px;
  height: 1920px;
  background: linear-gradient(135deg, #10b981 0%, #059669 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
}
.container {
  width: 880px;
  padding: 60px;
  text-align: center;
}
.title {
  font-size: 90px;
  font-weight: 800;
  color: white;
  margin-bottom: 100px;
  line-height: 1.2;
}
.comparison {
  background: rgba(0,0,0,0.2);
  border-radius: 40px;
  padding: 70px;
  margin-bottom: 50px;
}
.label {
  font-size: 60px;
  font-weight: 700;
  color: rgba(255,255,255,0.8);
  margin-bottom: 30px;
}
.option {
  font-size: 75px;
  font-weight: 800;
  color: white;
  margin-bottom: 40px;
  line-height: 1.3;
}
.cal {
  font-size: 95px;
  font-weight: 900;
  color: white;
  text-shadow: 0 4px 20px rgba(0,0,0,0.3);
}
.savings {
  font-size: 65px;
  font-weight: 700;
  color: white;
  margin-top: 80px;
  padding: 50px;
  background: rgba(0,0,0,0.3);
  border-radius: 30px;
}
</style>
</head>
<body>
<div class="container">
  <div class="title">The Lower-Cal Order 💡</div>
  
  <div class="comparison">
    <div class="label">Swap chips for coleslaw</div>
    <div class="option">2 pieces + coleslaw + roll</div>
    <div class="cal">530 cal</div>
  </div>
  
  <div class="savings">Save 210 calories 🎯</div>
</div>
</body>
</html>
