<!DOCTYPE html>
<html>
<head>
<style>
body {
  margin: 0;
  width: 1080px;
  height: 1920px;
  background: #1a1a1a;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
}
.container {
  width: 880px;
  padding: 60px;
  text-align: center;
}
.title {
  font-size: 85px;
  font-weight: 800;
  color: white;
  margin-bottom: 80px;
  line-height: 1.3;
}
.cta-box {
  background: linear-gradient(135deg, #10b981 0%, #059669 100%);
  border-radius: 50px;
  padding: 100px 80px;
  margin-bottom: 60px;
}
.cta-text {
  font-size: 80px;
  font-weight: 800;
  color: white;
  line-height: 1.3;
  margin-bottom: 50px;
}
.app-name {
  font-size: 110px;
  font-weight: 900;
  color: white;
  text-shadow: 0 6px 25px rgba(0,0,0,0.3);
  margin-bottom: 40px;
}
.subtitle {
  font-size: 60px;
  font-weight: 600;
  color: rgba(255,255,255,0.9);
}
.footer {
  font-size: 55px;
  color: rgba(255,255,255,0.5);
  margin-top: 80px;
  line-height: 1.5;
}
</style>
</head>
<body>
<div class="container">
  <div class="title">Track it before<br>you wreck it 💪</div>
  
  <div class="cta-box">
    <div class="cta-text">Start tracking on</div>
    <div class="app-name">FitSorted</div>
    <div class="subtitle">WhatsApp calorie tracker</div>
  </div>
  
  <div class="footer">Log meals • Track macros • Hit your goals<br>All on WhatsApp 📱</div>
</div>
</body>
</html>
