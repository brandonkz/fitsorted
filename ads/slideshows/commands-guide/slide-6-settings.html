<!DOCTYPE html>
<html><head><meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;600;700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1080px; background: #0a0a0a; font-family: 'Inter', sans-serif; overflow: hidden; padding: 60px; display: flex; flex-direction: column; }
  .brand { display: flex; align-items: center; gap: 12px; margin-bottom: 40px; }
  .brand-dot { width: 14px; height: 14px; background: #25D366; border-radius: 50%; }
  .brand-text { color: #25D366; font-family: 'Anton', sans-serif; font-size: 28px; letter-spacing: 4px; }
  .slide-num { position: absolute; top: 50px; right: 60px; color: rgba(255,255,255,0.3); font-size: 22px; font-weight: 600; }
  .section-title { color: #25D366; font-family: 'Anton', sans-serif; font-size: 48px; margin-bottom: 32px; }
  .cmd { display: flex; align-items: flex-start; gap: 20px; margin-bottom: 24px; }
  .cmd-icon { font-size: 36px; flex-shrink: 0; margin-top: 4px; }
  .cmd-text { flex: 1; }
  .cmd-name { color: #fff; font-weight: 700; font-size: 30px; margin-bottom: 4px; }
  .cmd-desc { color: rgba(255,255,255,0.45); font-size: 24px; line-height: 1.3; }
  .divider { height: 1px; background: rgba(255,255,255,0.08); margin: 24px 0; }
  .swipe { color: rgba(255,255,255,0.3); font-size: 22px; font-weight: 600; position: absolute; bottom: 50px; right: 60px; }
</style></head><body>
  <div class="brand"><div class="brand-dot"></div><span class="brand-text">FITSORTED</span></div>
  <div class="slide-num">6/7</div>
  <div class="section-title">⚙️ ACCOUNT & MORE</div>
  <div class="cmd">
    <div class="cmd-icon">📊</div>
    <div class="cmd-text">
      <div class="cmd-name">status</div>
      <div class="cmd-desc">Check subscription & trial days left</div>
    </div>
  </div>
  <div class="cmd">
    <div class="cmd-icon">🔄</div>
    <div class="cmd-text">
      <div class="cmd-name">reset</div>
      <div class="cmd-desc">Recalculate your calorie goals</div>
    </div>
  </div>
  <div class="cmd">
    <div class="cmd-icon">📤</div>
    <div class="cmd-text">
      <div class="cmd-name">export</div>
      <div class="cmd-desc">Download all your food data as CSV</div>
    </div>
  </div>
  <div class="cmd">
    <div class="cmd-icon">🎁</div>
    <div class="cmd-text">
      <div class="cmd-name">invite</div>
      <div class="cmd-desc">Refer friends — earn R10 off each</div>
    </div>
  </div>
  <div class="cmd">
    <div class="cmd-icon">🏷️</div>
    <div class="cmd-text">
      <div class="cmd-name">promo [code]</div>
      <div class="cmd-desc">Redeem a discount code</div>
    </div>
  </div>
  <div class="cmd">
    <div class="cmd-icon">🆘</div>
    <div class="cmd-text">
      <div class="cmd-name">support</div>
      <div class="cmd-desc">Something broken? We'll fix it</div>
    </div>
  </div>
  <div class="swipe">SWIPE →</div>
</body></html>
