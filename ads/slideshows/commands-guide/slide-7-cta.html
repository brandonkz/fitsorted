<!DOCTYPE html>
<html><head><meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;600;700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1080px; background: #0a0a0a; font-family: 'Inter', sans-serif; overflow: hidden; padding: 60px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
  .brand { display: flex; align-items: center; gap: 12px; position: absolute; top: 50px; left: 60px; }
  .brand-dot { width: 14px; height: 14px; background: #25D366; border-radius: 50%; }
  .brand-text { color: #25D366; font-family: 'Anton', sans-serif; font-size: 28px; letter-spacing: 4px; }
  .slide-num { position: absolute; top: 50px; right: 60px; color: rgba(255,255,255,0.3); font-size: 22px; font-weight: 600; }
  .emoji { font-size: 80px; margin-bottom: 32px; }
  .title { color: #fff; font-family: 'Anton', sans-serif; font-size: 64px; line-height: 1.1; margin-bottom: 24px; }
  .title .green { color: #25D366; }
  .sub { color: rgba(255,255,255,0.5); font-size: 28px; line-height: 1.5; max-width: 800px; margin-bottom: 40px; }
  .cta-box { background: #25D366; color: #0a0a0a; font-family: 'Anton', sans-serif; font-size: 36px; padding: 20px 48px; border-radius: 16px; letter-spacing: 2px; }
  .handle { color: rgba(255,255,255,0.3); font-size: 24px; position: absolute; bottom: 50px; }
</style></head><body>
  <div class="brand"><div class="brand-dot"></div><span class="brand-text">FITSORTED</span></div>
  <div class="slide-num">7/7</div>
  <div class="emoji">🏋️</div>
  <div class="title">JUST SEND<br><span class="green">"HI"</span><br>TO START</div>
  <div class="sub">No app download. No login.<br>Just WhatsApp.</div>
  <div class="cta-box">FREE TO START →</div>
  <div class="handle">fitsorted.co.za</div>
</body></html>
