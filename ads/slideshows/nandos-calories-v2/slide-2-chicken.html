<!DOCTYPE html>
<html><head><meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;600;700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1080px; background: #0a0a0a; font-family: 'Inter', sans-serif; overflow: hidden; position: relative; display: flex; flex-direction: column; }
  .brand { display: flex; align-items: center; gap: 12px; position: absolute; top: 50px; left: 60px; z-index: 3; }
  .brand-dot { width: 14px; height: 14px; background: #25D366; border-radius: 50%; }
  .brand-text { color: #25D366; font-family: 'Anton', sans-serif; font-size: 28px; letter-spacing: 4px; }
  .slide-num { position: absolute; top: 50px; right: 60px; color: rgba(255,255,255,0.3); font-size: 22px; font-weight: 600; z-index: 3; }
  .img-container { width: 100%; height: 540px; overflow: hidden; position: relative; }
  .img-container img { width: 100%; height: 100%; object-fit: cover; }
  .img-gradient { position: absolute; bottom: 0; left: 0; width: 100%; height: 200px; background: linear-gradient(transparent, #0a0a0a); }
  .info { flex: 1; padding: 40px 60px; display: flex; flex-direction: column; justify-content: center; }
  .food-name { color: #fff; font-family: 'Anton', sans-serif; font-size: 64px; line-height: 1.1; margin-bottom: 10px; }
  .food-detail { color: rgba(255,255,255,0.5); font-size: 26px; margin-bottom: 30px; }
  .cal-row { display: flex; align-items: baseline; gap: 16px; margin-bottom: 20px; }
  .cal-num { color: #25D366; font-family: 'Anton', sans-serif; font-size: 96px; line-height: 1; }
  .cal-label { color: rgba(255,255,255,0.5); font-size: 32px; font-weight: 600; }
  .bar { width: 100%; height: 10px; background: rgba(255,255,255,0.08); border-radius: 5px; overflow: hidden; }
  .bar-fill { height: 100%; background: #25D366; border-radius: 5px; }
  .bar-note { color: rgba(255,255,255,0.4); font-size: 22px; margin-top: 10px; }
</style></head><body>
  <div class="brand"><div class="brand-dot"></div><span class="brand-text">FITSORTED</span></div>
  <div class="slide-num">2/6</div>
  <div class="img-container">
    <img src="images/half-chicken.png" />
    <div class="img-gradient"></div>
  </div>
  <div class="info">
    <div class="food-name">HALF CHICKEN</div>
    <div class="food-detail">Flame-grilled with peri-peri</div>
    <div class="cal-row">
      <span class="cal-num">620</span>
      <span class="cal-label">calories</span>
    </div>
    <div class="bar"><div class="bar-fill" style="width: 31%;"></div></div>
    <div class="bar-note">31% of your daily budget — not bad on its own</div>
  </div>
</body></html>
