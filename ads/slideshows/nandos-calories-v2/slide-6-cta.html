<!DOCTYPE html>
<html><head><meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;600;700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1080px; background: #0a0a0a; font-family: 'Inter', sans-serif; overflow: hidden; padding: 60px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
  .brand { display: flex; align-items: center; gap: 12px; position: absolute; top: 50px; left: 60px; }
  .brand-dot { width: 14px; height: 14px; background: #25D366; border-radius: 50%; }
  .brand-sm { color: #25D366; font-family: 'Anton', sans-serif; font-size: 28px; letter-spacing: 4px; }
  .slide-num { position: absolute; top: 50px; right: 60px; color: rgba(255,255,255,0.3); font-size: 22px; font-weight: 600; }
  .brand-big { color: #25D366; font-family: 'Anton', sans-serif; font-size: 72px; letter-spacing: 6px; margin-bottom: 40px; }
  .tagline { color: #fff; font-family: 'Anton', sans-serif; font-size: 56px; line-height: 1.2; margin-bottom: 20px; }
  .sub { color: rgba(255,255,255,0.5); font-size: 28px; margin-bottom: 50px; line-height: 1.5; }
  .wa-box { background: #25D366; border-radius: 20px; padding: 28px 60px; display: flex; align-items: center; gap: 20px; margin-bottom: 30px; }
  .wa-icon { font-size: 44px; }
  .wa-text { color: #000; font-size: 32px; font-weight: 800; }
  .price { color: rgba(255,255,255,0.4); font-size: 26px; margin-bottom: 50px; }
  .price span { color: #25D366; font-weight: 700; }
  .features { display: flex; gap: 30px; flex-wrap: wrap; justify-content: center; }
  .feat { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 16px 24px; }
  .feat-text { color: rgba(255,255,255,0.6); font-size: 22px; font-weight: 600; }
  .bottom { position: absolute; bottom: 50px; color: rgba(255,255,255,0.3); font-size: 20px; }
</style></head><body>
  <div class="brand"><div class="brand-dot"></div><span class="brand-sm">FITSORTED</span></div>
  <div class="slide-num">6/6</div>
  <div class="brand-big">FITSORTED</div>
  <div class="tagline">TRACK YOUR CALORIES<br>VIA WHATSAPP</div>
  <div class="sub">Just text what you ate. Our AI agent does the rest.<br>SA food database built in 🇿🇦</div>
  <div class="wa-box">
    <span class="wa-icon">🤖</span>
    <span class="wa-text">Try our WhatsApp agent</span>
  </div>
  <div class="features">
    <div class="feat"><span class="feat-text">🍗 SA Foods</span></div>
    <div class="feat"><span class="feat-text">📊 Macro Tracking</span></div>
    <div class="feat"><span class="feat-text">🌅 Morning Check-in</span></div>
    <div class="feat"><span class="feat-text">🌙 Evening Summary</span></div>
  </div>
  <div class="bottom">fitsorted.co.za</div>
</body></html>
