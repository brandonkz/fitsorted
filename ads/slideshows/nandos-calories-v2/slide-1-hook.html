<!DOCTYPE html>
<html><head><meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;600;700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1080px; background: #0a0a0a; font-family: 'Inter', sans-serif; overflow: hidden; position: relative; }
  .bg-img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.35; filter: blur(2px); }
  .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(180deg, rgba(10,10,10,0.3) 0%, rgba(10,10,10,0.85) 55%, rgba(10,10,10,0.95) 100%); }
  .content { position: relative; z-index: 2; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: flex-end; padding: 60px; }
  .brand { display: flex; align-items: center; gap: 12px; position: absolute; top: 50px; left: 60px; z-index: 3; }
  .brand-dot { width: 14px; height: 14px; background: #25D366; border-radius: 50%; }
  .brand-text { color: #25D366; font-family: 'Anton', sans-serif; font-size: 28px; letter-spacing: 4px; }
  .slide-num { position: absolute; top: 50px; right: 60px; color: rgba(255,255,255,0.3); font-size: 22px; font-weight: 600; z-index: 3; }
  .hook { color: #fff; font-family: 'Anton', sans-serif; font-size: 82px; line-height: 1.05; margin-bottom: 30px; }
  .hook .green { color: #25D366; }
  .sub { color: rgba(255,255,255,0.6); font-size: 32px; font-weight: 600; line-height: 1.4; }
  .swipe { display: flex; align-items: center; gap: 10px; margin-top: 40px; color: rgba(255,255,255,0.4); font-size: 22px; font-weight: 600; }
</style></head><body>
  <img class="bg-img" src="images/half-chicken.png" />
  <div class="overlay"></div>
  <div class="brand"><div class="brand-dot"></div><span class="brand-text">FITSORTED</span></div>
  <div class="slide-num">1/6</div>
  <div class="content">
    <div class="hook">YOUR NANDO'S<br>ORDER HAS<br><span class="green">MORE CALORIES</span><br>THAN YOU THINK</div>
    <div class="sub">We broke down the most popular order 🍗</div>
    <div class="swipe">SWIPE →</div>
  </div>
</body></html>
