<!DOCTYPE html>
<html><head><meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;600;700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1080px; background: #0a0a0a; font-family: 'Inter', sans-serif; overflow: hidden; padding: 60px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
  .brand { display: flex; align-items: center; gap: 12px; position: absolute; top: 50px; left: 60px; }
  .brand-dot { width: 14px; height: 14px; background: #25D366; border-radius: 50%; }
  .brand-text { color: #25D366; font-family: 'Anton', sans-serif; font-size: 28px; letter-spacing: 4px; }
  .slide-num { position: absolute; top: 50px; right: 60px; color: rgba(255,255,255,0.3); font-size: 22px; font-weight: 600; }
  .label { color: rgba(255,255,255,0.4); font-size: 28px; font-weight: 700; letter-spacing: 6px; margin-bottom: 20px; }
  .big-num { color: #ef4444; font-family: 'Anton', sans-serif; font-size: 180px; line-height: 1; margin-bottom: 10px; }
  .cal-text { color: rgba(255,255,255,0.5); font-size: 40px; font-weight: 600; margin-bottom: 50px; }
  .comparisons { display: flex; flex-direction: column; gap: 20px; width: 100%; max-width: 800px; }
  .comp { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 24px 32px; display: flex; align-items: center; gap: 16px; }
  .comp-icon { font-size: 36px; }
  .comp-text { color: #fff; font-size: 28px; font-weight: 600; text-align: left; flex: 1; }
  .comp-text span { color: #25D366; }
  .bar-section { width: 100%; max-width: 800px; margin-top: 40px; }
  .bar-label { display: flex; justify-content: space-between; color: rgba(255,255,255,0.4); font-size: 20px; margin-bottom: 8px; }
  .bar { width: 100%; height: 16px; background: rgba(255,255,255,0.08); border-radius: 8px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 8px; background: linear-gradient(90deg, #25D366, #f59e0b, #ef4444); }
</style></head><body>
  <div class="brand"><div class="brand-dot"></div><span class="brand-text">FITSORTED</span></div>
  <div class="slide-num">4/6</div>
  <div class="label">TOTAL DAMAGE</div>
  <div class="big-num">1,360</div>
  <div class="cal-text">calories in one meal</div>
  <div class="comparisons">
    <div class="comp">
      <span class="comp-icon">🍔</span>
      <div class="comp-text">More than <span>2 Big Macs</span> (1,100 cal)</div>
    </div>
    <div class="comp">
      <span class="comp-icon">😬</span>
      <div class="comp-text"><span>68%</span> of your entire daily budget</div>
    </div>
    <div class="comp">
      <span class="comp-icon">👇</span>
      <div class="comp-text">The chicken was fine — <span>the sides killed you</span></div>
    </div>
  </div>
  <div class="bar-section">
    <div class="bar-label"><span>0 cal</span><span>2,000 cal daily budget</span></div>
    <div class="bar"><div class="bar-fill" style="width: 68%;"></div></div>
  </div>
</body></html>
