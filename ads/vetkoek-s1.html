<!DOCTYPE html><html><head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box;}
body{width:1080px;height:1080px;font-family:-apple-system,system-ui,'Helvetica Neue',sans-serif;overflow:hidden;position:relative;background:#0a0a0a;}
.bg{position:absolute;inset:0;background:radial-gradient(ellipse at 60% 30%, #2a1800 0%, #0d0700 50%, #000 100%);}
.overlay{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,0.2) 0%,rgba(0,0,0,0.6) 100%);}
.content{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:70px 80px;}
.tag{background:rgba(255,140,0,0.15);border:1.5px solid rgba(255,140,0,0.5);color:#ff8c00;font-size:26px;font-weight:700;letter-spacing:3px;padding:10px 28px;border-radius:40px;text-transform:uppercase;margin-bottom:40px;}
.icon{font-size:100px;margin-bottom:20px;}
.question{font-size:52px;font-weight:900;color:rgba(255,255,255,0.55);text-align:center;text-transform:uppercase;letter-spacing:2px;margin-bottom:10px;}
.food-name{font-size:96px;font-weight:900;color:#fff;text-align:center;line-height:1;letter-spacing:-2px;margin-bottom:6px;}
.food-sub{font-size:30px;color:rgba(255,255,255,0.4);text-align:center;margin-bottom:50px;}
.cal-row{display:flex;align-items:baseline;gap:16px;margin-bottom:16px;}
.cal-big{font-size:160px;font-weight:900;color:#ff8c00;line-height:1;letter-spacing:-6px;}
.cal-label{font-size:40px;font-weight:700;color:rgba(255,255,255,0.6);letter-spacing:4px;}
.swipe{font-size:24px;color:rgba(255,255,255,0.3);margin-top:40px;letter-spacing:1px;}
.dots{display:flex;gap:10px;margin-top:16px;}
.dot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,0.2);}
.dot.active{background:#ff8c00;width:28px;border-radius:6px;}
</style></head><body>
<div class="bg"></div><div class="overlay"></div>
<div class="content">
  <div class="tag">🇿🇦 SA FRIDAY CLASSIC</div>
  <div class="icon">🥘</div>
  <div class="question">DO YOU KNOW HOW MUCH IS IN YOUR</div>
  <div class="food-name">Vetkoek & Mince</div>
  <div class="food-sub">Friday lunch staple</div>
  <div class="cal-row"><div class="cal-big">480</div><div class="cal-label">CAL</div></div>
  <div class="swipe">SWIPE TO SEE THE BREAKDOWN →</div>
  <div class="dots"><div class="dot active"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
</div>
</body></html>
