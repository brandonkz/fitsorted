<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitSorted Trial Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .stat-value {
            font-size: 2.5em;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 5px;
        }

        .stat-label {
            color: #666;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-subtext {
            color: #999;
            font-size: 0.85em;
            margin-top: 5px;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .card h2 {
            margin-bottom: 20px;
            color: #667eea;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .expiration-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .expiration-item {
            padding: 15px;
            border-left: 4px solid #667eea;
            background: #f8f9fa;
            margin-bottom: 10px;
            border-radius: 6px;
        }

        .expiration-item.expired {
            border-left-color: #ff6b6b;
            background: #fff5f5;
        }

        .expiration-date {
            font-weight: bold;
            color: #667eea;
            margin-bottom: 8px;
        }

        .expiration-item.expired .expiration-date {
            color: #ff6b6b;
        }

        .user-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #e9ecef;
        }

        .user-info:last-child {
            border-bottom: none;
        }

        .user-id {
            font-family: monospace;
            color: #666;
        }

        .user-stats {
            display: flex;
            gap: 15px;
            font-size: 0.9em;
            color: #999;
        }

        .badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 0.75em;
            font-weight: 600;
            text-transform: uppercase;
        }

        .badge.active {
            background: #d4edda;
            color: #155724;
        }

        .badge.premium {
            background: #fff3cd;
            color: #856404;
        }

        .badge.churned {
            background: #f8d7da;
            color: #721c24;
        }

        .chart-placeholder {
            height: 300px;
            background: #f8f9fa;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
            font-style: italic;
        }

        .conversion-funnel {
            margin-top: 20px;
        }

        .funnel-step {
            padding: 15px;
            background: linear-gradient(to right, #667eea 0%, #764ba2 100%);
            color: white;
            margin-bottom: 10px;
            border-radius: 6px;
            position: relative;
            overflow: hidden;
        }

        .funnel-step:before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            background: rgba(255, 255, 255, 0.2);
            transition: width 0.3s ease;
        }

        .funnel-step.step-1:before { width: 100%; }
        .funnel-step.step-2:before { width: 80%; }
        .funnel-step.step-3:before { width: 40%; }
        .funnel-step.step-4:before { width: 10%; }

        .funnel-content {
            position: relative;
            z-index: 1;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .funnel-label {
            font-weight: 600;
        }

        .funnel-value {
            font-size: 1.5em;
            font-weight: bold;
        }

        .alert {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
        }

        .alert.danger {
            background: #f8d7da;
            border-left-color: #dc3545;
        }

        @media (max-width: 768px) {
            .main-grid {
                grid-template-columns: 1fr;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🏋️ FitSorted Trial Dashboard</h1>
            <p class="subtitle">Real-time trial conversion tracking</p>
        </header>

        <div class="stats-grid" id="statsGrid"></div>

        <div class="main-grid">
            <div class="card">
                <h2>📅 Trial Expirations</h2>
                <div class="expiration-list" id="expirationList"></div>
            </div>

            <div class="card">
                <h2>📊 Conversion Funnel</h2>
                <div class="conversion-funnel" id="conversionFunnel"></div>
            </div>
        </div>

        <div class="card">
            <h2>📈 7-Day Conversion Trend</h2>
            <div class="chart-placeholder">
                Chart will render here (implement with Chart.js or D3.js)
            </div>
        </div>
    </div>

    <script>
        const GRANDFATHER_DATE = new Date('2026-03-19T23:59:59Z');
        const TRIAL_DAYS = 7;

        async function loadData() {
            const response = await fetch('stats.json');
            const stats = await response.json();
            renderDashboard(stats);
        }

        function renderDashboard(stats) {
            const now = new Date();
            
            // Filter post-grandfather users
            const newUsers = (stats.recentSignups || []).filter(u => 
                new Date(u.joinedAt) > GRANDFATHER_DATE
            );

            // Calculate trial statuses
            const usersWithTrialStatus = newUsers.map(u => {
                const joinedAt = new Date(u.joinedAt);
                const trialEnd = new Date(joinedAt.getTime() + (TRIAL_DAYS * 24 * 60 * 60 * 1000));
                const isExpired = now > trialEnd;
                const daysLeft = Math.ceil((trialEnd - now) / (24 * 60 * 60 * 1000));
                
                return {
                    ...u,
                    joinedAt,
                    trialEnd,
                    isExpired,
                    daysLeft,
                    converted: u.isPro === true
                };
            });

            const expired = usersWithTrialStatus.filter(u => u.isExpired);
            const converted = expired.filter(u => u.converted);
            const active = usersWithTrialStatus.filter(u => !u.isExpired);
            const conversionRate = expired.length > 0 ? (converted.length / expired.length * 100).toFixed(1) : 0;

            // Render stats cards
            const statsGrid = document.getElementById('statsGrid');
            statsGrid.innerHTML = `
                <div class="stat-card">
                    <div class="stat-value">${usersWithTrialStatus.length}</div>
                    <div class="stat-label">Total Trials</div>
                    <div class="stat-subtext">Post-grandfather</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${active.length}</div>
                    <div class="stat-label">Active Trials</div>
                    <div class="stat-subtext">${active.filter(u => u.daysLeft <= 2).length} ending soon</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${expired.length}</div>
                    <div class="stat-label">Expired Trials</div>
                    <div class="stat-subtext">Last 7 days</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${converted.length}</div>
                    <div class="stat-label">Converted</div>
                    <div class="stat-subtext">${conversionRate}% conversion rate</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">R${(converted.length * 36).toFixed(0)}</div>
                    <div class="stat-label">Monthly MRR</div>
                    <div class="stat-subtext">${converted.length} × R36</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">R${(stats.totalUsers * 36 * 0.05).toFixed(0)}</div>
                    <div class="stat-label">Potential MRR</div>
                    <div class="stat-subtext">@ 5% conversion</div>
                </div>
            `;

            // Group by expiration date
            const grouped = {};
            usersWithTrialStatus.forEach(u => {
                const date = u.trialEnd.toISOString().split('T')[0];
                if (!grouped[date]) grouped[date] = [];
                grouped[date].push(u);
            });

            // Render expiration list
            const expirationList = document.getElementById('expirationList');
            const sortedDates = Object.keys(grouped).sort();
            
            expirationList.innerHTML = sortedDates.map(date => {
                const users = grouped[date];
                const isExpired = new Date(date) < now;
                const convertedCount = users.filter(u => u.converted).length;
                
                return `
                    <div class="expiration-item ${isExpired ? 'expired' : ''}">
                        <div class="expiration-date">
                            ${isExpired ? '❌' : '⏰'} ${date} — ${users.length} trial${users.length > 1 ? 's' : ''}
                            ${isExpired ? ` (${convertedCount} converted)` : ''}
                        </div>
                        ${users.map(u => `
                            <div class="user-info">
                                <div>
                                    <span class="user-id">***${u.id.slice(-4)}</span>
                                    ${u.converted ? '<span class="badge premium">💎 Premium</span>' : ''}
                                    ${u.logs > 20 ? '<span class="badge active">🔥 Active</span>' : ''}
                                    ${u.logs === 0 ? '<span class="badge churned">😴 Churned</span>' : ''}
                                </div>
                                <div class="user-stats">
                                    <span>📝 ${u.logs} logs</span>
                                    <span>📅 ${Math.floor((now - u.joinedAt) / (24 * 60 * 60 * 1000))} days</span>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
            }).join('');

            // Render conversion funnel
            const funnel = document.getElementById('conversionFunnel');
            const signedUp = usersWithTrialStatus.length;
            const logged = usersWithTrialStatus.filter(u => u.logs > 0).length;
            const engaged = usersWithTrialStatus.filter(u => u.logs > 5).length;
            const paidUsers = converted.length;

            funnel.innerHTML = `
                <div class="funnel-step step-1">
                    <div class="funnel-content">
                        <span class="funnel-label">Signed Up</span>
                        <span class="funnel-value">${signedUp}</span>
                    </div>
                </div>
                <div class="funnel-step step-2">
                    <div class="funnel-content">
                        <span class="funnel-label">Logged Food (Activation)</span>
                        <span class="funnel-value">${logged} <small>(${(logged/signedUp*100).toFixed(0)}%)</small></span>
                    </div>
                </div>
                <div class="funnel-step step-3">
                    <div class="funnel-content">
                        <span class="funnel-label">Engaged (5+ logs)</span>
                        <span class="funnel-value">${engaged} <small>(${(engaged/signedUp*100).toFixed(0)}%)</small></span>
                    </div>
                </div>
                <div class="funnel-step step-4">
                    <div class="funnel-content">
                        <span class="funnel-label">Converted to Paid</span>
                        <span class="funnel-value">${paidUsers} <small>(${conversionRate}%)</small></span>
                    </div>
                </div>
            `;

            // Add alerts
            if (conversionRate < 5) {
                const alert = document.createElement('div');
                alert.className = 'alert danger';
                alert.innerHTML = `
                    <strong>⚠️ Low Conversion Rate:</strong> ${conversionRate}% is below industry benchmark (5-10% for freemium apps).
                    Consider: stronger trial reminders, better onboarding, or retargeting campaigns.
                `;
                document.querySelector('.container').insertBefore(alert, document.querySelector('.stats-grid'));
            }
        }

        // Auto-refresh every 5 minutes
        loadData();
        setInterval(loadData, 5 * 60 * 1000);
    </script>
</body>
</html>
